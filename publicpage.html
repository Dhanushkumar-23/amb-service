<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AMB Services - Report Accident</title>

<style>
body{
    font-family: Arial, sans-serif;
    background: #f5f5f5;
    text-align: center;
    padding: 20px;
}

.container{
    max-width: 700px;
    margin: auto;
    background: #fff;
    padding: 20px;
    border-radius: 10px;
    box-shadow: 0 0 10px rgba(0,0,0,.15);
}

h1{
    color: #d60000;
}

video, canvas, img{
    width: 100%;
    max-width: 500px;
    border-radius: 10px;
    margin-top: 15px;
}

button{
    background: #d60000;
    color: white;
    border: none;
    padding: 12px 20px;
    margin: 10px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 16px;
}

button:hover{
    background: #b00000;
}

.location-box{
    margin-top: 20px;
    background: #eee;
    padding: 15px;
    border-radius: 10px;
}

#capturedImage{
    display: none;
}

#address{
    word-wrap: break-word;
    font-weight: bold;
    color: #006400;
}

#mapBtn{
    display: none;
}
</style>
</head>

<body>

<div class="container">

    <h1>🚑 AMB Services</h1>
    <h2>Report Accident</h2>

    <button onclick="startCamera()">
        Open Camera
    </button>

    <br>

    <video id="video" autoplay playsinline></video>

    <br>

    <button onclick="capturePhoto()">
        Capture Accident Photo
    </button>

    <canvas id="canvas" style="display:none;"></canvas>

    <img id="capturedImage">

    <div class="location-box">

        <h3>GPS Location</h3>

        <p>
            <strong>Latitude:</strong>
            <span id="lat">Waiting...</span>
        </p>

        <p>
            <strong>Longitude:</strong>
            <span id="lng">Waiting...</span>
        </p>

        <p>
            <strong>Address:</strong><br>
            <span id="address">Waiting...</span>
        </p>

        <button onclick="getLocation()">
            Detect Location
        </button>

        <button id="mapBtn">
            View in Google Maps
        </button>

    </div>

</div>

<script>

let stream;

// Open Camera
async function startCamera(){

    try{

        stream = await navigator.mediaDevices.getUserMedia({
            video:{
                facingMode:"environment"
            }
        });

        document.getElementById("video").srcObject = stream;

    }catch(err){

        alert(
            "Camera access denied or unsupported.\n\n" +
            "Please allow camera permission and use HTTPS."
        );

        console.error(err);
    }
}


// Capture Photo
function capturePhoto(){

    const video = document.getElementById("video");
    const canvas = document.getElementById("canvas");
    const img = document.getElementById("capturedImage");

    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;

    const ctx = canvas.getContext("2d");

    ctx.drawImage(video, 0, 0);

    const imageData = canvas.toDataURL("image/png");

    img.src = imageData;
    img.style.display = "block";

    // Stop camera after capture
    if(stream){
        stream.getTracks().forEach(track => track.stop());
    }

    // Automatically fetch location
    getLocation();
}


// Get Device Location
function getLocation(){

    if(!navigator.geolocation){

        alert("Geolocation is not supported.");
        return;
    }

    navigator.geolocation.getCurrentPosition(

        async function(position){

            const lat = position.coords.latitude;
            const lng = position.coords.longitude;

            document.getElementById("lat").innerText = lat;
            document.getElementById("lng").innerText = lng;

            console.log("Latitude:", lat);
            console.log("Longitude:", lng);

            // Reverse Geocoding
            try{

                const response = await fetch(
                    `https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}`
                );

                const data = await response.json();

                if(data.display_name){

                    document.getElementById("address").innerText =
                        data.display_name;

                }else{

                    document.getElementById("address").innerText =
                        "Address not found";
                }

            }catch(error){

                document.getElementById("address").innerText =
                    "Unable to fetch address";

                console.error(error);
            }

            // Enable Google Maps button
            const mapBtn = document.getElementById("mapBtn");

            mapBtn.style.display = "inline-block";

            mapBtn.onclick = function(){

                window.open(
                    `https://www.google.com/maps?q=${lat},${lng}`,
                    "_blank"
                );

            };

        },

        function(error){

            alert("Please allow location permission.");

            console.error(error);

        },

        {
            enableHighAccuracy: true,
            timeout: 10000,
            maximumAge: 0
        }

    );
}

</script>

</body>
</html>

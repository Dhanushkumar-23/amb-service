<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AMB Services - Public Login</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:linear-gradient(135deg,#d90000,#ff4d4d);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.login-container{
    width:400px;
    background:white;
    padding:35px;
    border-radius:15px;
    box-shadow:0 5px 20px rgba(0,0,0,0.2);
}

.logo{
    text-align:center;
    margin-bottom:25px;
}

.logo h1{
    color:#d90000;
    font-size:32px;
}

.logo p{
    color:#666;
    margin-top:5px;
}

.form-group{
    margin-bottom:18px;
}

label{
    display:block;
    margin-bottom:6px;
    font-weight:bold;
}

input{
    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:6px;
    font-size:15px;
}

.login-btn{
    width:100%;
    padding:14px;
    background:#d90000;
    color:white;
    border:none;
    border-radius:6px;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
}

.login-btn:hover{
    background:#b30000;
}

.links{
    margin-top:15px;
    text-align:center;
}

.links a{
    text-decoration:none;
    color:#d90000;
    font-size:14px;
}

.message{
    margin-top:15px;
    text-align:center;
    font-weight:bold;
}
</style>
</head>
<body>

<div class="login-container">

    <div class="logo">
        <h1>🚑 AMB Services</h1>
        <p>Public User Login</p>
    </div>

    <form id="loginForm">

        <div class="form-group">
            <label>Mobile Number</label>
            <input
                type="tel"
                id="mobile"
                placeholder="Enter Mobile Number"
                required>
        </div>

        <div class="form-group">
            <label>Password</label>
            <input
                type="password"
                id="password"
                placeholder="Enter Password"
                required>
        </div>

        <button type="submit" class="login-btn">
            Login
        </button>

    </form>

    <div class="links">
        <a href="#">Forgot Password?</a>
        <br><br>
        <a href="#">Create New Account</a>
    </div>

    <div class="message" id="message"></div>

</div>

<script>
document.getElementById("loginForm").addEventListener("submit", function(e){

    e.preventDefault();

    let mobile = document.getElementById("mobile").value.trim();
    let password = document.getElementById("password").value.trim();

    if(mobile !== "" && password !== ""){

        document.getElementById("message").innerHTML =
        "✅ Login Successful";

        document.getElementById("message").style.color = "green";

        // Redirect after 1 second
        setTimeout(function(){
            window.location.href = "publicpage.html";
        }, 1000);

    } else {

        document.getElementById("message").innerHTML =
        "❌ Please enter mobile number and password";

        document.getElementById("message").style.color = "red";
    }

});
</script>

</body>
</html>
